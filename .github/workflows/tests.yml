name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-bot:
    strategy:
      matrix:
        # macos-26 (arm64)：上游发布预编译二进制的主平台。
        # ubuntu-24.04：Linux 源码编译验证（glibc 2.39，不触发 Tier 2 告警）。
        # macos-15-intel：Intel Mac 源码编译验证；其 cleanup 阶段 purge /usr/local
        #   偏慢，故给 120 分钟超时（其余平台 60 分钟）。
        include:
          - os: macos-26
            timeout_minutes: 5
          - os: ubuntu-24.04
            timeout_minutes: 5
          - os: macos-15-intel
            timeout_minutes: 10 # cleanup 阶段 purge /usr/local 偏慢，多给一倍
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax
      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'
